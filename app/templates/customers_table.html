{% for customer in customers %}
<tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/30 transition-colors text-slate-600 dark:text-slate-300 group">
    <td class="px-8 py-5">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-brand-primary/10 flex items-center justify-center text-brand-primary font-bold group-hover:scale-110 transition-transform">
                {{ customer.name[0].upper() }}
            </div>
            <span class="font-bold text-slate-900 dark:text-white">{{ customer.name }}</span>
        </div>
    </td>
    <td class="px-8 py-5 text-sm font-medium">{{ customer.location or '-' }}</td>
    <td class="px-8 py-5 text-sm font-medium">
        <div class="space-y-1">
            <div class="flex items-center gap-2">
                <i class="fas fa-user text-[10px] text-slate-400"></i>
                {{ customer.contact_name or customer.contact_person or '-' }}
            </div>
            {% if customer.contact_phone %}
            <div class="flex items-center gap-2 text-xs text-slate-500">
                <i class="fas fa-phone text-[9px]"></i>
                {{ customer.contact_phone }}
            </div>
            {% endif %}
        </div>
    </td>
    <td class="px-8 py-5 text-right">
        <div class="flex items-center justify-end gap-2">
            <button @click="editContactModalOpen = true; editCustomerId = {{ customer.id }}; editContactName = '{{ customer.contact_name or customer.contact_person or '' }}'; editContactPhone = '{{ customer.contact_phone or '' }}'"
                    class="p-2 rounded-lg text-slate-400 hover:bg-brand-primary/10 hover:text-brand-primary transition-all" title="Contact">
                <i class="fas fa-address-book"></i>
            </button>
            <button class="p-2 rounded-lg text-slate-400 hover:bg-sky-500/10 hover:text-sky-600 dark:hover:text-sky-400 transition-all" title="Bewerken">
                <i class="fas fa-edit"></i>
            </button>
            <button hx-delete="/customers/{{ customer.id }}" 
                    hx-target="#customer-table" 
                    hx-confirm="Weet u zeker dat u {{ customer.name }} wilt verwijderen?"
                    class="p-2 rounded-lg text-slate-400 hover:bg-red-500/10 hover:text-red-600 dark:hover:text-red-400 transition-all" title="Verwijderen">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
    </td>
</tr>
{% endfor %}
