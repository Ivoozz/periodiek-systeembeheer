<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ settings.header_text }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://kit.fontawesome.com/your-fontawesome-kit.js" crossorigin="anonymous"></script>
</head>
<body class="flex flex-col min-h-screen">
    <!-- Navbar -->
    <nav class="card" style="border-radius: 0; border-bottom: 1px solid var(--border-dark);">
        <div class="container mx-auto px-4">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center">
                    {% if settings.logo_url %}
                        <img class="h-10 w-auto" src="{{ settings.logo_url }}" alt="Logo">
                    {% else %}
                        <span class="text-2xl font-bold text-white">{{ settings.header_text }}</span>
                    {% endif %}
                </div>
                <div class="flex items-center space-x-4">
                    {% if request.path != '/login' %}
                    <a href="/admin/settings" class="text-sm text-gray-400 hover:text-white font-medium transition-colors">Instellingen</a>
                    <a href="/logout" class="btn btn-primary" style="background-color: var(--card-dark); color: var(--text-light); border: 1px solid var(--border-dark);">Uitloggen</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 sm:py-12">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="py-8">
        <div class="container mx-auto px-4 text-center text-muted text-sm">
            <p>{{ settings.footer_text }}</p>
        </div>
    </footer>
</body>
</html>
