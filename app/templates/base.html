<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodiek Systeembeheer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <nav class="bg-blue-800 text-white p-4 flex justify-between">
        <div class="font-bold text-xl">Systeembeheer Portal</div>
        <div>
            {% if user %}
                <span>Welkom, {{ user.username }}</span>
                <a href="/logout" class="ml-4 underline">Uitloggen</a>
            {% endif %}
        </div>
    </nav>
    <main class="p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
