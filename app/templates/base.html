<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ settings.header_text }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    {% if settings.logo_url %}
                        <img class="h-10 w-auto" src="{{ settings.logo_url }}" alt="Logo">
                    {% else %}
                        <span class="text-xl font-bold text-indigo-600">{{ settings.header_text }}</span>
                    {% endif %}
                </div>
                <div class="flex items-center space-x-4">
                    <button onclick="changeOwnPassword()" class="text-sm text-gray-500 hover:text-indigo-600 font-medium">Wachtwoord wijzigen</button>
                    <a href="/logout" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition-colors">Uitloggen</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
            <p>{{ settings.footer_text }}</p>
        </div>
    </footer>

    <script>
        async function changeOwnPassword() {
            const oldPassword = prompt('Voer je huidige wachtwoord in:');
            if (!oldPassword) return;
            const newPassword = prompt('Voer je nieuwe wachtwoord in:');
            if (!newPassword) return;

            const response = await fetch('/users/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
            });

            if (response.ok) {
                alert('Wachtwoord succesvol gewijzigd!');
            } else {
                const err = await response.json();
                alert('Fout: ' + err.detail);
            }
        }
    </script>
</body>
</html>
