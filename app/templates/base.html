<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Periodiek Systeembeheer | SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link-active { background-color: #f3f4f6; color: #111827; border-left: 4px solid #2563eb; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Top Navigation -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-30 h-16 flex items-center justify-between px-6">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 p-2 rounded-lg">
                <i class="fas fa-server text-white text-lg"></i>
            </div>
            <span class="text-xl font-bold text-gray-900 tracking-tight">Systeem<span class="text-blue-600">Beheer</span></span>
        </div>
        
        <div class="flex items-center gap-4">
            {% if user %}
            <div class="hidden md:flex flex-col items-end mr-2">
                <span class="text-sm font-semibold text-gray-900">{{ user.username }}</span>
                <span class="text-xs text-gray-500 uppercase">{{ user.role }}</span>
            </div>
            <div class="h-10 w-10 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 border border-gray-300">
                <i class="fas fa-user"></i>
            </div>
            <a href="/logout" class="ml-2 text-gray-400 hover:text-red-600 transition-colors" title="Uitloggen">
                <i class="fas fa-sign-out-alt text-lg"></i>
            </a>
            {% endif %}
        </div>
    </header>

    <div class="flex min-h-[calc(100vh-64px)]">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 hidden lg:block overflow-y-auto">
            <nav class="p-4 space-y-1">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 px-3">Hoofdmenu</p>
                
                <a href="/admin" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all sidebar-link-active">
                    <i class="fas fa-chart-line w-5"></i>
                    <span class="font-medium">Dashboard</span>
                </a>
                
                <a href="/admin" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all">
                    <i class="fas fa-users w-5"></i>
                    <span class="font-medium">Klanten</span>
                </a>

                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-6 mb-2 px-3">Rapportage</p>
                
                <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all">
                    <i class="fas fa-file-alt w-5"></i>
                    <span class="font-medium">Recente Rapporten</span>
                </a>

                <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all">
                    <i class="fas fa-calendar-check w-5"></i>
                    <span class="font-medium">Planning</span>
                </a>

                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-6 mb-2 px-3">Systeem</p>
                
                <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all">
                    <i class="fas fa-cog w-5"></i>
                    <span class="font-medium">Instellingen</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <div class="max-w-7xl mx-auto">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Mobile Navigation (Bottom) -->
    <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-6 py-3 flex justify-between items-center z-50">
        <a href="/admin" class="text-blue-600 flex flex-col items-center">
            <i class="fas fa-chart-line"></i>
            <span class="text-[10px] mt-1 font-medium">Dashboard</span>
        </a>
        <a href="/admin" class="text-gray-400 flex flex-col items-center">
            <i class="fas fa-users"></i>
            <span class="text-[10px] mt-1 font-medium">Klanten</span>
        </a>
        <a href="#" class="text-gray-400 flex flex-col items-center">
            <i class="fas fa-plus-circle text-xl"></i>
        </a>
        <a href="#" class="text-gray-400 flex flex-col items-center">
            <i class="fas fa-file-alt"></i>
            <span class="text-[10px] mt-1 font-medium">Rapporten</span>
        </a>
        <a href="#" class="text-gray-400 flex flex-col items-center">
            <i class="fas fa-cog"></i>
            <span class="text-[10px] mt-1 font-medium">Instellingen</span>
        </a>
    </div>
</body>
</html>
