{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Onderhoudsrapport</h1>
        <a href="/klant" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Terug naar Dashboard</a>
    </div>

    <div id="report-content" class="space-y-8">
        <p class="text-gray-500 italic">Rapport laden...</p>
    </div>
</div>

<template id="report-header-template">
    <div class="bg-white p-6 rounded shadow-md border-l-8 border-blue-800">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <span class="block text-xs font-bold uppercase text-gray-500">Datum Uitvoering</span>
                <span class="text-lg font-semibold datum-uitvoering"></span>
            </div>
            <div>
                <span class="block text-xs font-bold uppercase text-gray-500">Medewerker</span>
                <span class="text-lg font-semibold medewerker"></span>
            </div>
            <div>
                <span class="block text-xs font-bold uppercase text-gray-500">Locatie</span>
                <span class="text-lg font-semibold locatie"></span>
            </div>
        </div>
    </div>
</template>

<template id="category-template">
    <div class="bg-white p-6 rounded shadow-md">
        <h2 class="text-xl font-bold border-b pb-2 mb-4 text-blue-900 category-name"></h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b text-sm text-gray-600">
                        <th class="py-2 w-1/2">Controlepunt</th>
                        <th class="py-2 w-1/6 text-center">Resultaat</th>
                        <th class="py-2 w-1/3">Toelichting</th>
                    </tr>
                </thead>
                <tbody class="items-body">
                </tbody>
            </table>
        </div>
    </div>
</template>

<template id="item-row-template">
    <tr class="border-b hover:bg-gray-50">
        <td class="py-3 font-medium item-name"></td>
        <td class="py-3 text-center">
            <span class="px-3 py-1 rounded-full text-xs font-bold item-result"></span>
        </td>
        <td class="py-3 text-sm italic text-gray-600 item-toelichting"></td>
    </tr>
</template>

<template id="klantpunten-template">
    <div class="bg-yellow-50 p-6 rounded shadow-md border-l-8 border-yellow-500">
        <h2 class="text-xl font-bold mb-4 text-yellow-900">Klantpunten & Acties</h2>
        <div class="space-y-4 klantpunten-body">
        </div>
    </div>
</template>

<template id="klantpunt-row-template">
    <div class="bg-white p-4 rounded border border-yellow-200">
        <div class="font-bold text-gray-800 beschrijving"></div>
        <div class="mt-2 text-sm text-green-700 font-medium italic">
            <span class="font-bold">Actie: </span><span class="actie"></span>
        </div>
    </div>
</template>

<script>
    const reportId = {{ report_id }};
    const reportContent = document.getElementById('report-content');

    async function loadReport() {
        try {
            const response = await fetch(`/api/reports/${reportId}`);
            if (!response.ok) throw new Error('Rapport niet gevonden');
            const report = await response.json();
            
            reportContent.innerHTML = '';
            
            // Render Header
            const header = document.getElementById('report-header-template').content.cloneNode(true);
            const date = new Date(report.datum_uitvoering).toLocaleDateString('nl-NL', {
                day: '2-digit', month: '2-digit', year: 'numeric'
            });
            header.querySelector('.datum-uitvoering').textContent = date;
            header.querySelector('.medewerker').textContent = report.medewerker;
            header.querySelector('.locatie').textContent = report.locatie;
            reportContent.appendChild(header);
            
            // Group items by category
            const categories = {};
            report.items.forEach(item => {
                if (!categories[item.categorie]) {
                    categories[item.categorie] = [];
                }
                categories[item.categorie].push(item);
            });
            
            // Render Categories
            Object.keys(categories).forEach(catName => {
                const catTemplate = document.getElementById('category-template').content.cloneNode(true);
                catTemplate.querySelector('.category-name').textContent = catName;
                const body = catTemplate.querySelector('.items-body');
                
                categories[catName].forEach(item => {
                    const row = document.getElementById('item-row-template').content.cloneNode(true);
                    row.querySelector('.item-name').textContent = item.controlepunt;
                    
                    const resultBadge = row.querySelector('.item-result');
                    resultBadge.textContent = item.resultaat;
                    if (item.resultaat === 'OK') {
                        resultBadge.classList.add('bg-green-100', 'text-green-800');
                    } else if (item.resultaat === 'NOK') {
                        resultBadge.classList.add('bg-red-100', 'text-red-800');
                    } else {
                        resultBadge.classList.add('bg-gray-100', 'text-gray-800');
                    }
                    
                    row.querySelector('.item-toelichting').textContent = item.toelichting || '-';
                    body.appendChild(row);
                });
                
                reportContent.appendChild(catTemplate);
            });
            
            // Render Klantpunten
            if (report.klantpunten && report.klantpunten.length > 0) {
                const kpContainer = document.getElementById('klantpunten-template').content.cloneNode(true);
                const kpBody = kpContainer.querySelector('.klantpunten-body');
                
                report.klantpunten.forEach(kp => {
                    const row = document.getElementById('klantpunt-row-template').content.cloneNode(true);
                    row.querySelector('.beschrijving').textContent = kp.beschrijving;
                    row.querySelector('.actie').textContent = kp.uitgevoerde_actie;
                    kpBody.appendChild(row);
                });
                
                reportContent.appendChild(kpContainer);
            }
            
        } catch (error) {
            reportContent.innerHTML = `<p class="text-red-500 font-bold">Fout: ${error.message}</p>`;
        }
    }

    loadReport();
</script>
{% endblock %}
