{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-white mb-8">Systeem Instellingen</h1>

    <!-- Branding Section -->
    <div class="card mb-12">
        <div class="p-6 md:p-8">
            <h2 class="text-xl font-semibold text-white mb-6">Branding & Layout</h2>
            <form id="settingsForm" enctype="multipart/form-data" class="space-y-6">
                <!-- Logo -->
                <div>
                    <label class="form-label">Website Logo (PNG)</label>
                    <div class="flex items-center space-x-6">
                        <div class="h-20 w-40 bg-gray-700 rounded-lg border-2 border-dashed border-gray-600 flex items-center justify-center overflow-hidden">
                            {% if settings.logo_url %}
                                <img src="{{ settings.logo_url }}" class="max-h-full max-w-full object-contain" id="logoPreview">
                            {% else %}
                                <span class="text-gray-400 text-sm">Geen logo</span>
                            {% endif %}
                        </div>
                        <input type="file" name="logo" accept="image/png" class="form-input">
                    </div>
                </div>
                <!-- Header Text -->
                <div>
                    <label for="header_text" class="form-label">Pagina Header</label>
                    <input id="header_text" type="text" name="header_text" value="{{ settings.header_text }}" class="form-input">
                </div>
                <!-- Footer Text -->
                <div>
                    <label for="footer_text" class="form-label">Pagina Footer</label>
                    <textarea id="footer_text" name="footer_text" rows="3" class="form-input">{{ settings.footer_text }}</textarea>
                </div>
                <div class="pt-4">
                    <button type="submit" class="btn btn-primary">Instellingen Opslaan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Security Section -->
    <div class="card mb-12">
        <div class="p-6 md:p-8">
            <h2 class="text-xl font-semibold text-white mb-6">Wachtwoord Wijzigen</h2>
            <form id="changePasswordForm" class="space-y-4 max-w-sm">
                <div>
                    <label for="old_password" class="form-label">Huidig Wachtwoord</label>
                    <input type="password" id="old_password" name="old_password" class="form-input" required>
                </div>
                <div>
                    <label for="new_password" class="form-label">Nieuw Wachtwoord</label>
                    <input type="password" id="new_password" name="new_password" class="form-input" required>
                </div>
                <div class="pt-4">
                    <button type="submit" class="btn btn-primary">Wachtwoord Opslaan</button>
                </div>
            </form>
        </div>
    </div>


    <!-- User Management Section -->
    <div class="card">
        <div class="p-6 md:p-8">
            <h2 class="text-xl font-semibold text-white mb-6">Wachtwoord Beheer (Gebruikers)</h2>
            <div id="userList" class="space-y-4">
                <!-- User list will be loaded via JS -->
            </div>
        </div>
    </div>
</div>

<script>
    // General Settings Form
    document.getElementById('settingsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        try {
            const response = await fetch('/settings/', { method: 'POST', body: formData });
            if (response.ok) {
                alert('Instellingen succesvol bijgewerkt!');
                window.location.reload();
            } else {
                const err = await response.json();
                alert('Fout: ' + err.detail);
            }
        } catch (error) {
            alert('Er is een fout opgetreden.');
        }
    });

    // Change Password Form
    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const oldPassword = form.old_password.value;
        const newPassword = form.new_password.value;

        const response = await fetch('/users/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
        });

        if (response.ok) {
            alert('Wachtwoord succesvol gewijzigd!');
            form.reset();
        } else {
            const err = await response.json();
            alert('Fout: ' + err.detail);
        }
    });

    // User Management
    async function loadUsers() {
        const response = await fetch('/users/');
        const users = await response.json();
        const list = document.getElementById('userList');
        
        list.innerHTML = users.map(user => `
            <div class="flex items-center justify-between p-4 bg-gray-800 rounded-lg">
                <div>
                    <span class="font-medium text-white">${user.username}</span>
                    <span class="ml-2 px-2 py-0.5 text-xs rounded-full bg-gray-700 text-gray-300">${user.role}</span>
                </div>
                <button onclick="changeUserPassword(${user.id}, '${user.username}')" 
                    class="text-blue-400 hover:text-blue-300 text-sm font-medium">
                    Reset Wachtwoord
                </button>
            </div>
        `).join('');
    }

    async function changeUserPassword(userId, username) {
        const newPassword = prompt(`Voer nieuw wachtwoord in voor ${username}:`);
        if (!newPassword) return;

        const response = await fetch('/users/admin-change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, new_password: newPassword })
        });

        if (response.ok) {
            alert('Wachtwoord succesvol gewijzigd!');
        } else {
            const err = await response.json();
            alert('Fout: ' + err.detail);
        }
    }

    loadUsers();
</script>
{% endblock %}
