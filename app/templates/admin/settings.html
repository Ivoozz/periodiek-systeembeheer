{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto space-y-8 animate-in fade-in duration-500">
    <div>
        <h1 class="text-3xl font-bold text-white tracking-tight">Instellingen</h1>
        <p class="text-slate-400 mt-1">Beheer uw account en systeemvoorkeuren</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- Sidebar Navigation -->
        <div class="space-y-2">
            <button class="w-full text-left px-4 py-2.5 rounded-lg bg-sky-500 text-slate-950 font-bold flex items-center">
                <i class="fas fa-lock mr-3"></i> Beveiliging
            </button>
            <button class="w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:bg-slate-900 hover:text-white transition-colors flex items-center">
                <i class="fas fa-palette mr-3"></i> Uiterlijk
            </button>
            <button class="w-full text-left px-4 py-2.5 rounded-lg text-slate-400 hover:bg-slate-900 hover:text-white transition-colors flex items-center">
                <i class="fas fa-bell mr-3"></i> Notificaties
            </button>
        </div>

        <!-- Main Settings Content -->
        <div class="md:col-span-2 space-y-6">
            <!-- Password Change Card -->
            <div class="card p-8">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="h-10 w-10 bg-amber-500/10 rounded-lg flex items-center justify-center text-amber-500">
                        <i class="fas fa-shield-halved"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">Wachtwoord Wijzigen</h3>
                </div>

                <form action="/users/change-password" method="POST" class="space-y-6">
                    <div>
                        <label for="old_password" class="form-label">Huidig Wachtwoord</label>
                        <input type="password" id="old_password" name="old_password" required class="form-input">
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="new_password" class="form-label">Nieuw Wachtwoord</label>
                            <input type="password" id="new_password" name="new_password" required class="form-input">
                        </div>
                        <div>
                            <label for="confirm_password" class="form-label">Bevestig Wachtwoord</label>
                            <input type="password" id="confirm_password" name="confirm_password" required class="form-input">
                        </div>
                    </div>

                    <div class="pt-4 border-t border-slate-800 flex justify-end">
                        <button type="submit" class="btn-primary">
                            Wachtwoord Bijwerken
                        </button>
                    </div>
                </form>
            </div>

            <!-- Profile Info Card -->
            <div class="card p-8">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="h-10 w-10 bg-sky-500/10 rounded-lg flex items-center justify-center text-sky-500">
                        <i class="fas fa-user-gear"></i>
                    </div>
                    <h3 class="text-xl font-bold text-white">Accountgegevens</h3>
                </div>
                
                <div class="space-y-4">
                    <div class="flex justify-between py-3 border-b border-slate-800">
                        <span class="text-slate-400">Gebruikersnaam</span>
                        <span class="text-white font-medium">{{ user.username }}</span>
                    </div>
                    <div class="flex justify-between py-3 border-b border-slate-800">
                        <span class="text-slate-400">Rol</span>
                        <span class="px-2 py-0.5 bg-sky-500/10 text-sky-500 text-xs font-bold rounded border border-sky-500/20 uppercase">
                            {{ user.role }}
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Validatie voor wachtwoord bevestiging
    const form = document.querySelector('form[action="/users/change-password"]');
    const newPass = document.getElementById('new_password');
    const confirmPass = document.getElementById('confirm_password');

    form.addEventListener('submit', function(e) {
        if (newPass.value !== confirmPass.value) {
            e.preventDefault();
            alert('Nieuwe wachtwoorden komen niet overeen!');
            const submitBtn = this.querySelector('button[type="submit"]');
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Wachtwoord Bijwerken';
            }
        }
    });
</script>
{% endblock %}
