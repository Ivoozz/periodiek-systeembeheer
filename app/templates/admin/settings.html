{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto py-8 px-4">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">Systeem Instellingen</h1>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-6">
            <h2 class="text-xl font-semibold mb-6">Branding & Layout</h2>
            
            <form id="settingsForm" enctype="multipart/form-data" class="space-y-6">
                <!-- Logo -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Website Logo (PNG)</label>
                    <div class="flex items-center space-x-6">
                        <div class="h-24 w-48 bg-gray-50 rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center overflow-hidden">
                            {% if settings.logo_url %}
                                <img src="{{ settings.logo_url }}" class="max-h-full max-w-full object-contain" id="logoPreview">
                            {% else %}
                                <span class="text-gray-400 text-sm">Geen logo</span>
                            {% endif %}
                        </div>
                        <input type="file" name="logo" accept="image/png" class="block w-full text-sm text-gray-500
                            file:mr-4 file:py-2 file:px-4
                            file:rounded-full file:border-0
                            file:text-sm file:font-semibold
                            file:bg-indigo-50 file:text-indigo-700
                            hover:file:bg-indigo-100">
                    </div>
                </div>

                <!-- Header -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Pagina Header</label>
                    <input type="text" name="header_text" value="{{ settings.header_text }}" 
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>

                <!-- Footer -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Pagina Footer</label>
                    <textarea name="footer_text" rows="3"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">{{ settings.footer_text }}</textarea>
                </div>

                <div class="pt-4">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                        Instellingen Opslaan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="mt-12 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-6">
            <h2 class="text-xl font-semibold mb-6">Wachtwoord Beheer (Gebruikers)</h2>
            <div id="userList" class="space-y-4">
                <!-- Wordt geladen via JS -->
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('settingsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        try {
            const response = await fetch('/settings/', {
                method: 'POST',
                body: formData
            });
            
            if (response.ok) {
                alert('Instellingen succesvol bijgewerkt!');
                window.location.reload();
            } else {
                const err = await response.json();
                alert('Fout: ' + err.detail);
            }
        } catch (error) {
            alert('Er is een fout opgetreden.');
        }
    });

    async function loadUsers() {
        const response = await fetch('/users/');
        const users = await response.json();
        const list = document.getElementById('userList');
        
        list.innerHTML = users.map(user => `
            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                <div>
                    <span class="font-medium text-gray-900">${user.username}</span>
                    <span class="ml-2 px-2 py-0.5 text-xs rounded-full bg-gray-200 text-gray-600">${user.role}</span>
                </div>
                <button onclick="changeUserPassword(${user.id}, '${user.username}')" 
                    class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">
                    Reset Wachtwoord
                </button>
            </div>
        `).join('');
    }

    async function changeUserPassword(userId, username) {
        const newPassword = prompt(`Voer nieuw wachtwoord in voor ${username}:`);
        if (!newPassword) return;

        const response = await fetch('/users/admin-change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, new_password: newPassword })
        });

        if (response.ok) {
            alert('Wachtwoord succesvol gewijzigd!');
        } else {
            const err = await response.json();
            alert('Fout: ' + err.detail);
        }
    }

    loadUsers();
</script>
{% endblock %}
