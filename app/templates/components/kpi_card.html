{% macro kpi_card(title, value, icon, color='blue') %}
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center hover:shadow-md transition-shadow duration-200">
    <div class="p-3 bg-{{ color }}-50 rounded-lg text-{{ color }}-600 mr-4">
        {{ icon | safe }}
    </div>
    <div>
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">{{ title }}</p>
        <p class="text-2xl font-extrabold text-gray-900 mt-0.5">{{ value }}</p>
    </div>
</div>
{% endmacro %}
