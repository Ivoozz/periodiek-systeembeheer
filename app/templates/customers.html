{% extends "base.html" %}

{% block content %}
<div x-data="{ 
    modalOpen: false,
    editContactModalOpen: false, 
    editCustomerId: null, 
    editContactName: '', 
    editContactPhone: '' 
}" class="space-y-8 animate-in fade-in duration-500">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Klantenbeheer</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Beheer uw klantenbestand en specifieke instellingen.</p>
        </div>
        <button @click="modalOpen = true" class="btn-ultra">
            <i class="fas fa-plus text-sm"></i> Nieuwe Klant
        </button>
    </div>

    <!-- Search bar -->
    <div class="glass-card p-4 relative overflow-hidden group">
        <div class="absolute inset-y-0 left-0 w-1 bg-brand-primary transition-all duration-300"></div>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                <i class="fas fa-search group-focus-within:text-brand-primary transition-colors"></i>
            </div>
            <input type="text" name="search" 
                   hx-get="/customers/table" 
                   hx-trigger="keyup changed delay:500ms" 
                   hx-target="#customer-table"
                   class="form-input pl-11 py-3" 
                   placeholder="Zoek op klantnaam...">
        </div>
    </div>

    <!-- Customers Table -->
    <div class="glass-card overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-800">
                        <th class="px-8 py-4 font-bold uppercase text-[10px] tracking-widest">Naam</th>
                        <th class="px-8 py-4 font-bold uppercase text-[10px] tracking-widest">Locatie</th>
                        <th class="px-8 py-4 font-bold uppercase text-[10px] tracking-widest">Contactpersoon</th>
                        <th class="px-8 py-4 font-bold uppercase text-[10px] tracking-widest text-right">Acties</th>
                    </tr>
                </thead>
                <tbody id="customer-table" class="divide-y divide-slate-200 dark:divide-slate-800">
                    {% include "customers_table.html" %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Customer Modal -->
    <div x-show="modalOpen" 
         x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/40 backdrop-blur-sm transition-opacity" 
             @click="modalOpen = false"
             x-show="modalOpen"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"></div>

        <div class="glass-card relative w-full max-w-lg shadow-2xl overflow-hidden"
             x-show="modalOpen"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-8 scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 scale-100">
            <div class="px-8 py-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                <h3 class="text-xl font-black text-slate-900 dark:text-white">Nieuwe Klant</h3>
                <button @click="modalOpen = false" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-8">
                <form hx-post="/customers/" hx-target="#customer-table" hx-on::after-request="modalOpen = false; this.reset()" class="space-y-6">
                    <div>
                        <label class="form-label">Bedrijfsnaam</label>
                        <input type="text" name="name" required class="form-input" placeholder="Bijv. Acme Corp">
                    </div>
                    <div>
                        <label class="form-label">Locatie</label>
                        <input type="text" name="location" class="form-input" placeholder="Bijv. Amsterdam">
                    </div>
                    <div>
                        <label class="form-label">Contactpersoon</label>
                        <input type="text" name="contact_person" class="form-input" placeholder="Naam contactpersoon">
                    </div>
                    <div class="pt-4 flex justify-end gap-3">
                        <button type="button" @click="modalOpen = false" class="px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                            Annuleren
                        </button>
                        <button type="submit" class="btn-ultra">
                            Opslaan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Contact Modal -->
    <div x-show="editContactModalOpen" 
         x-cloak
         class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-950/40 backdrop-blur-sm transition-opacity" 
             @click="editContactModalOpen = false"
             x-show="editContactModalOpen"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"></div>

        <div class="glass-card relative w-full max-w-md shadow-2xl overflow-hidden"
             x-show="editContactModalOpen"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-8 scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 scale-100">
            <div class="px-8 py-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                <h3 class="text-xl font-black text-slate-900 dark:text-white">Contact Bewerken</h3>
                <button @click="editContactModalOpen = false" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-8">
                <form :action="'/customers/' + editCustomerId + '/contact'" method="POST" class="space-y-6">
                    <div>
                        <label class="form-label">Naam Contactpersoon</label>
                        <input type="text" name="contact_name" x-model="editContactName" required class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Telefoonnummer</label>
                        <input type="tel" name="contact_phone" x-model="editContactPhone" required class="form-input">
                    </div>
                    <div class="pt-4 flex justify-end gap-3">
                        <button type="button" @click="editContactModalOpen = false" class="px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                            Annuleren
                        </button>
                        <button type="submit" class="btn-ultra">
                            Opslaan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
