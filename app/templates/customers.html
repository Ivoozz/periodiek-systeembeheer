{% extends "base.html" %}

{% block content %}
<div class="space-y-8 animate-in fade-in duration-500">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
        <div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Klantenbeheer</h1>
            <p class="text-slate-400 mt-1">Beheer uw klantenbestand en specifieke instellingen</p>
        </div>
        <button onclick="document.getElementById('add-customer-modal').classList.remove('hidden')" class="btn-primary flex items-center">
            <i class="fas fa-plus mr-2 text-sm"></i> Nieuwe Klant
        </button>
    </div>

    <!-- Search bar -->
    <div class="card p-4 bg-slate-800/30">
        <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                <i class="fas fa-search"></i>
            </div>
            <input type="text" name="search" 
                   hx-get="/customers/table" 
                   hx-trigger="keyup changed delay:500ms" 
                   hx-target="#customer-table"
                   class="form-input pl-10" 
                   placeholder="Zoek op klantnaam...">
        </div>
    </div>

    <!-- Customers Table -->
    <div class="card bg-slate-800/50 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 border-b border-slate-700 bg-slate-800/50">
                        <th class="px-6 py-3 font-semibold uppercase text-xs">Naam</th>
                        <th class="px-6 py-3 font-semibold uppercase text-xs">Locatie</th>
                        <th class="px-6 py-3 font-semibold uppercase text-xs">Contactpersoon</th>
                        <th class="px-6 py-3 font-semibold uppercase text-xs text-right">Acties</th>
                    </tr>
                </thead>
                <tbody id="customer-table" class="divide-y divide-slate-700">
                    {% include "customers_table.html" %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Customer Modal -->
<div id="add-customer-modal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 transition-opacity" aria-hidden="true">
            <div class="absolute inset-0 bg-slate-950 opacity-75 backdrop-blur-sm"></div>
        </div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div class="inline-block align-bottom bg-slate-900 rounded-xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full border border-slate-800">
            <div class="bg-slate-900 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <h3 class="text-xl font-bold text-white mb-4">Nieuwe Klant Toevoegen</h3>
                <form hx-post="/customers/" hx-target="#customer-table" hx-on::after-request="document.getElementById('add-customer-modal').classList.add('hidden'); this.reset()" class="space-y-4">
                    <div>
                        <label class="form-label">Bedrijfsnaam</label>
                        <input type="text" name="name" required class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Locatie</label>
                        <input type="text" name="location" class="form-input">
                    </div>
                    <div>
                        <label class="form-label">Contactpersoon</label>
                        <input type="text" name="contact_person" class="form-input">
                    </div>
                    <div class="pt-4 flex justify-end space-x-3">
                        <button type="button" onclick="document.getElementById('add-customer-modal').classList.add('hidden')" class="px-4 py-2 text-slate-400 hover:text-white font-medium transition-colors">
                            Annuleren
                        </button>
                        <button type="submit" class="btn-primary">
                            Opslaan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
