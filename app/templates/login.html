{% extends "base.html" %}

{% block title %}Login - Periodiek Systeembeheer{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-12rem)]">
    <div class="w-full max-w-md space-y-8 animate-in fade-in zoom-in duration-500">
        <div class="glass-card p-10 relative overflow-hidden">
            <!-- Decorative element -->
            <div class="absolute -top-12 -right-12 w-32 h-32 bg-sky-500/10 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-12 -left-12 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>

            <div class="relative z-10">
                <div class="text-center space-y-2">
                    <div class="inline-flex items-center justify-center p-3 bg-sky-500 rounded-2xl text-white shadow-xl shadow-sky-500/30 mb-4">
                        <i class="fas fa-server text-2xl"></i>
                    </div>
                    <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Welkom</h1>
                    <p class="text-slate-500 dark:text-slate-400">Log in op het systeembeheer portaal</p>
                </div>

                {% if error %}
                <div class="mt-6 p-4 text-sm text-red-600 dark:text-red-400 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center gap-3">
                    <i class="fas fa-circle-exclamation"></i>
                    Ongeldige gebruikersnaam of wachtwoord.
                </div>
                {% endif %}

                <form action="/login" method="POST" class="mt-8 space-y-6">
                    <div class="space-y-2">
                        <label for="username" class="form-label">Gebruikersnaam</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-sky-500 transition-colors">
                                <i class="fas fa-user text-sm"></i>
                            </div>
                            <input type="text" name="username" id="username" required
                                class="form-input pl-11 py-3" placeholder="Uw gebruikersnaam">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label for="password" class="form-label">Wachtwoord</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-sky-500 transition-colors">
                                <i class="fas fa-lock text-sm"></i>
                            </div>
                            <input type="password" name="password" id="password" required
                                class="form-input pl-11 py-3" placeholder="••••••••">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-ultra w-full py-3 text-lg">
                        Inloggen <i class="fas fa-arrow-right text-xs ml-1"></i>
                    </button>
                </form>

                <div class="mt-8 pt-8 border-t border-slate-200 dark:border-slate-800 text-center">
                    <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Beveiligde Toegang</p>
                </div>
            </div>
        </div>
        
        <p class="text-center text-slate-400 text-sm">
            &copy; 2026 Systeembeheer Rebuild v4.0
        </p>
    </div>
</div>
{% endblock %}
