{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 min-h-[60vh]">
    <div class="max-w-md w-full space-y-8 animate-in fade-in duration-500">
        <div>
            <div class="mx-auto h-16 w-16 bg-sky-500 rounded-2xl flex items-center justify-center shadow-lg shadow-sky-500/20">
                <i class="fas fa-lock text-slate-900 text-3xl"></i>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-white">
                Welkom terug
            </h2>
            <p class="mt-2 text-center text-sm text-slate-400">
                Voer uw gegevens in om toegang te krijgen
            </p>
        </div>

        <div class="card p-8 shadow-2xl bg-slate-900/50 backdrop-blur-sm border-slate-800">
            {% if request.query_params.get("error") %}
            <div class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg mb-6 text-sm flex items-center">
                <i class="fas fa-exclamation-circle mr-3"></i>
                <p>Onjuiste gebruikersnaam of wachtwoord.</p>
            </div>
            {% endif %}

            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label for="username" class="form-label">Gebruikersnaam</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                            <i class="fas fa-user"></i>
                        </div>
                        <input id="username" name="username" type="text" required class="form-input pl-10" placeholder="bijv. beheerder" autofocus autocomplete="username">
                    </div>
                </div>

                <div>
                    <label for="password" class="form-label text-slate-400">Wachtwoord</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                            <i class="fas fa-key"></i>
                        </div>
                        <input id="password" name="password" type="password" required class="form-input pl-10" placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-sky-500 focus:ring-sky-500 border-slate-700 rounded bg-slate-800">
                        <label for="remember-me" class="ml-2 block text-sm text-slate-400">
                            Onthoud mij
                        </label>
                    </div>
                </div>

                <div>
                    <button type="submit" id="login-btn" class="w-full btn-primary group relative flex justify-center items-center py-3">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                            <i class="fas fa-sign-in-alt text-slate-900 group-hover:translate-x-1 transition-transform"></i>
                        </span>
                        Inloggen
                    </button>
                </div>
            </form>
        </div>
        
        <div class="text-center">
            <span class="text-slate-500 text-xs uppercase tracking-widest font-semibold">Beveiligde SSL Verbinding</span>
        </div>
    </div>
</div>
{% endblock %}
