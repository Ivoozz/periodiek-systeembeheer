{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded shadow-md mt-10">
    <h2 class="text-2xl mb-6 font-semibold text-center">Inloggen</h2>
    {% if request.query_params.get("error") %}
        <p class="text-red-500 mb-4 text-sm text-center">Ongeldige gebruikersnaam of wachtwoord.</p>
    {% endif %}
    <form action="/login" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">Gebruikersnaam</label>
            <input type="text" name="username" class="w-full border p-2 rounded" required>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Wachtwoord</label>
            <input type="password" name="password" class="w-full border p-2 rounded" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Inloggen</button>
    </form>
</div>
{% endblock %}
