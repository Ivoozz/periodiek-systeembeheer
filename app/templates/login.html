{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-full" style="padding-top: 5vh;">
    <div class="w-full max-w-md">
        <div class="card p-8 md:p-10">
            <h2 class="text-3xl mb-6 font-bold text-center text-white">Inloggen</h2>
            {% if request.query_params.get("error") %}
            <div class="bg-red-900 border border-red-500 text-red-300 px-4 py-3 rounded-lg mb-6 text-sm" role="alert">
                <p>Ongeldige gebruikersnaam of wachtwoord.</p>
            </div>
            {% endif %}
            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label for="username" class="form-label">Gebruikersnaam</label>
                    <input id="username" type="text" name="username" class="form-input" required autocomplete="username" autofocus>
                </div>
                <div>
                    <label for="password" class="form-label">Wachtwoord</label>
                    <input id="password" type="password" name="password" class="form-input" required autocomplete="current-password">
                </div>
                <button type="submit" class="w-full btn btn-primary">Inloggen</button>
            </form>
        </div>
        <p class="text-center text-sm text-muted mt-6">
            Login om toegang te krijgen tot het beheerportaal.
        </p>
    </div>
</div>
{% endblock %}
